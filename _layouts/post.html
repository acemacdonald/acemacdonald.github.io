<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/images/favicon.png" />
    <title>{{ page.title }} | Angus Macdonald</title>
    <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/index.css" />
    <style>
        .post-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
            color: #333;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        .post-container h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #111;
        }
        .post-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2.5rem;
        }
        .post-container h2 {
            font-size: 1.35rem;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            color: #111;
        }
        .post-container pre {
            background: #f5f5f5;
            border-left: 3px solid #6c63ff;
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            border-radius: 4px;
            font-size: 0.88rem;
        }
        .post-container code {
            font-family: 'Courier New', monospace;
        }
        .post-container p code {
            background: #f0f0f0;
            padding: 0.1em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .post-container table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
        }
        .post-container table td, .post-container table th {
            border: 1px solid #ddd;
            padding: 0.6rem 1rem;
            text-align: left;
        }
        .post-container table tr:nth-child(even) {
            background: #f9f9f9;
        }
        .post-container blockquote {
            border-left: 3px solid #6c63ff;
            margin: 1.5rem 0;
            padding: 0.75rem 1.25rem;
            background: #f9f8ff;
            color: #555;
            font-style: italic;
        }
        .post-container hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 2.5rem 0;
        }
        .mermaid {
            text-align: center;
            margin: 2rem 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 3rem;
            color: #6c63ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header class="header" role="banner" id="top">
        <div class="row">
            <nav class="nav" role="navigation">
                <ul class="nav__items">
                    <li class="nav__item">
                        <a href="https://acemacdonald.github.io/#top" class="nav__link">Home</a>
                    </li>
                    <li class="nav__item">
                        <a href="https://acemacdonald.github.io/#work" class="nav__link">Work</a>
                    </li>
                    <li class="nav__item">
                        <a href="https://acemacdonald.github.io/#about" class="nav__link">About</a>
                    </li>
                    <li class="nav__item">
                        <a href="https://acemacdonald.github.io/#contact" class="nav__link">Contact</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="post-container">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>

        {{ content }}

        <a href="https://acemacdonald.github.io/blogs.html" class="back-link">&larr; Back to all posts</a>
    </div>

    <footer role="contentinfo" class="footer">
        <div class="row">
            <ul class="footer__social-links">
                <li class="footer__social-link-item">
                    <a href="https://github.com/acemacdonald" title="Link to Github Profile">
                        <img src="{{ site.baseurl }}/images/github.svg" class="footer__social-image" alt="Github">
                    </a>
                </li>
                <li class="footer__social-link-item">
                    <a href="https://www.linkedin.com/in/angus-macdonald92/" title="Link to Linkedin Profile">
                        <img src="{{ site.baseurl }}/images/linkedin.svg" class="footer__social-image" alt="Linkedin">
                    </a>
                </li>
            </ul>
            <p>&copy; 2020 - Template designed & developed by <a href="https://nisar.dev" class="link">Nisar</a>.</p>
        </div>
    </footer>

    <a href="#top" class="back-to-top" title="Back to Top">
        <img src="{{ site.baseurl }}/images/arrow-up.svg" alt="Back to Top" class="back-to-top__image" />
    </a>

    <script src="{{ site.baseurl }}/index.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true, theme: 'default' });
    </script>
</body>

</html>
